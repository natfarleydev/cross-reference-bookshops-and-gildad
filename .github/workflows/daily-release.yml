name: Daily catalogue release

# Rebuild the Bookshop.org × Gilad catalogue once a day and publish it as a
# GitHub Release, so a prebuilt, ready-to-browse SQLite catalogue is always
# available to download without anyone having to run `ingest` themselves.

on:
  schedule:
    # 05:17 UTC daily (off the top of the hour to be polite to the shared runners).
    - cron: "17 5 * * *"
  workflow_dispatch: {}        # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write              # needed to create tags/releases

concurrency:
  group: daily-release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # Generous for the first cold run (harvest + ~1150 Gilad lookups + magazine
    # image downloads). Once data/ and out/ are cached, daily runs are minutes.
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Restore catalogue + HTTP cache
        # Carry data/ (the SQLite catalogue *and* the cache-first HTTP store)
        # between runs so we never rebuild from scratch. The unique key always
        # misses on save, so each run writes a fresh cache; restore-keys pulls in
        # the most recent previous one. With this in place the daily build only
        # re-harvests Bookshop (cheap) and enriches *new* books — the slow,
        # rarely-changing Gilad pass is reused, not repeated.
        uses: actions/cache@v4
        with:
          path: data
          key: origami-data-${{ github.run_id }}
          restore-keys: |
            origami-data-

      - name: Restore magazine images
        # The Typst magazine downloads cover + Gilad model photos into out/.
        # Persisting out/ across runs (same rolling-key trick as data/) means each
        # day only fetches images for *new* books — the bulk are downloaded once
        # and reused. The downsampled derivatives in out/ are reused too.
        uses: actions/cache@v4
        with:
          path: out
          key: origami-out-${{ github.run_id }}
          restore-keys: |
            origami-out-

      - name: Seed the enriched catalogue
        # Gilad's database is not reliably reachable from GitHub-hosted runners, so
        # the daily build cannot enrich skill levels itself (a from-scratch CI run
        # produces 0 rated books). seed/catalog.sqlite.gz is a catalogue enriched
        # offline, where Gilad *is* reachable, and is the source of truth for skill
        # levels. Always overlay it so `ingest --refresh` upserts current Bookshop
        # data (prices/stock/new titles) on top while PRESERVING that enrichment —
        # which is what feeds the skill filter and the skill-organised magazine.
        # Rebuild it locally with `python -m origami.ingest --refresh` and recommit.
        run: |
          if [ -f seed/catalog.sqlite.gz ]; then
            mkdir -p data
            gzip -dc seed/catalog.sqlite.gz > data/catalog.sqlite
            echo "Seeded data/catalog.sqlite from seed/catalog.sqlite.gz"
          else
            echo "No seed found; building from scratch (skill levels may be empty)."
          fi

      - name: Lint and test
        run: |
          python -m ruff check app.py origami tests
          python -m pytest -q

      - name: Build the catalogue (refresh Bookshop on top of the seed)
        # --refresh re-harvests Bookshop for new titles / current stock & price;
        # upsert preserves the seed's Gilad enrichment (skill level + diagram
        # count). --no-enrich skips the live Gilad pass on purpose: Gilad isn't
        # reachable from CI, so querying it here only wastes time and would
        # mislabel new books as "Not in Gilad". New (non-seed) books stay "pending"
        # until the seed is rebuilt offline. Best-effort so a flaky Bookshop day
        # still publishes.
        continue-on-error: true
        env:
          ORIGAMI_REGION: uk
        run: |
          python -m origami.ingest --refresh --no-enrich

      - name: Set up Typst
        # Single static binary; used to lay out the illustrated magazine PDF.
        # Pinned to a version verified to compile scripts/magazine.typ.
        continue-on-error: true
        uses: typst-community/setup-typst@v5
        with:
          typst-version: "0.15.0"

      - name: Build the magazine PDF
        # Export the enriched catalogue to JSON + images (cover/photo binaries land
        # in out/, which is cached above), then compile the Typst magazine. Depends
        # on the catalogue build; best-effort so a bad upstream day still ships the
        # catalogue release.
        continue-on-error: true
        env:
          ORIGAMI_REGION: uk
        run: |
          PYTHONPATH=. python scripts/export_magazine_data.py
          typst compile --root . scripts/magazine.typ out/origami_magazine_typst.pdf

      - name: Package the catalogue
        id: package
        run: |
          set -euo pipefail
          mkdir -p dist
          DATE="$(date -u +%Y-%m-%d)"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          if [ -f data/catalog.sqlite ]; then
            gzip -c data/catalog.sqlite > "dist/origami-catalog-$DATE.sqlite.gz"
            BOOKS=$(python -c "from origami.catalog import Catalog; print(Catalog().count())")
            ENRICHED=$(python -c "from origami.catalog import Catalog; print(Catalog().enriched_count())")
          else
            BOOKS=0
            ENRICHED=0
          fi
          echo "books=$BOOKS" >> "$GITHUB_OUTPUT"
          echo "enriched=$ENRICHED" >> "$GITHUB_OUTPUT"
          MAGAZINE=no
          if [ -f out/origami_magazine_typst.pdf ]; then
            cp out/origami_magazine_typst.pdf "dist/origami-magazine-$DATE.pdf"
            MAGAZINE=yes
          fi
          echo "magazine=$MAGAZINE" >> "$GITHUB_OUTPUT"
          ls -la dist || true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: catalog-${{ steps.package.outputs.date }}
          name: Catalogue ${{ steps.package.outputs.date }}
          body: |
            Automated daily build of the Bookshop.org (UK) × Gilad origami catalogue.

            - Books in catalogue: **${{ steps.package.outputs.books }}**
            - Enriched with Gilad skill level + diagram count: **${{ steps.package.outputs.enriched }}**
            - Illustrated magazine PDF attached: **${{ steps.package.outputs.magazine }}**

            Attachments:
            - `*.sqlite.gz` — the prebuilt catalogue. Decompress it to
              `data/catalog.sqlite` and run `python app.py` to browse without a
              first-run harvest.
            - `*.pdf` — the illustrated "Bookshop.org × Gilad" magazine (covers,
              model photos, skill bands), ready to read or print.

            (If the counts above are 0 or the magazine is `no`, an upstream source was
            unavailable for this build — the next daily run will retry.)
          files: dist/*
          fail_on_unmatched_files: false
