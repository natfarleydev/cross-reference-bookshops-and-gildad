<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Origami Book Finder{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/"><span class="brand-mark">&#9650;</span> Origami Book Finder</a>
    <form class="header-search" action="/" method="get">
      <input type="search" name="q" placeholder="Filter by title, author&hellip;"
             value="{{ filters.text if filters else '' }}" autocomplete="off">
      <button type="submit">Filter</button>
    </form>
    <span class="region-badge" title="Storefront / currency">
      {{ settings.region.host }} &middot; {{ settings.currency }}
    </span>
  </header>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <span>
      Buy on <a href="{{ settings.region.base }}" target="_blank" rel="noopener">Bookshop.org</a>
      &middot; skill &amp; diagrams from <a href="https://www.giladorigami.com/" target="_blank" rel="noopener">Gilad&rsquo;s Origami Database</a>
    </span>
  </footer>
</body>
</html>
