# Gotenberg: stateless Chromium-backed HTML->PDF service.
# Used by scripts/magazine_html.py to render the magazine PDF without
# installing Chrome/GTK on the host. Same container on Windows + Linux.
#
#   docker compose up -d gotenberg
#   PYTHONPATH=. .venv/Scripts/python scripts/magazine_html.py
services:
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: origami-gotenberg
    ports:
      - "3000:3000"
    restart: unless-stopped
